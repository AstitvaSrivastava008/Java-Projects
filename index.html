<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localhost & Live Support</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f9f9f9;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .online {
            background-color: #d4edda;
            color: #155724;
        }
        .offline {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Environment Status</h1>
    <div id="status" class="status offline">Checking connection...</div>
    
    <script>
        // Detect environment
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const apiUrl = isLocalhost ? 'http://localhost:3000' : 'https://yourdomain.com';
        
        // Check connection
        fetch(apiUrl + '/health')
            .then(response => {
                document.getElementById('status').className = 'status online';
                document.getElementById('status').textContent = 
                    `✓ Connected - Mode: ${isLocalhost ? 'Localhost' : 'Live'}`;
            })
            .catch(() => {
                document.getElementById('status').className = 'status offline';
                document.getElementById('status').textContent = 
                    `✗ Offline - Mode: ${isLocalhost ? 'Localhost' : 'Live'}`;
            });
    </script>

</body>
</html>
